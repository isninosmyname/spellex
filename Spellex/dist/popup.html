<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spellex Popup</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 300px;
      padding: 16px;
      background-color: #1a1a2e;
      /* Dark modern theme */
      color: #e2e8f0;
      margin: 0;
    }

    h1 {
      font-size: 1.5rem;
      margin-top: 0;
      color: #a78bfa;
      /* Magical purple */
    }

    p {
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .actions {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
    }

    button {
      background-color: #8b5cf6;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #7c3aed;
    }

    button.secondary {
      background-color: #475569;
    }

    button.secondary:hover {
      background-color: #334155;
    }
  </style>
  <script type="module" crossorigin src="/assets/popup.html-BBKZvSLx.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
</head>

<body>
  <h1>✨ Spellex</h1>
  <p>AI-powered contextual spell checker.</p>

  <div class="actions">
    <button id="toggleBtn">Disable</button>
    <button id="optionsBtn" class="secondary">⚙️ Options</button>
  </div>

</body>

</html>
