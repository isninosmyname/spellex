<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spellex Options</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 24px;
            background-color: #0f172a;
            color: #f8fafc;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #a78bfa;
            margin-top: 0;
            border-bottom: 1px solid #334155;
            padding-bottom: 12px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #cbd5e1;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #475569;
            background-color: #1e293b;
            color: white;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.3);
        }

        button {
            background-color: #8b5cf6;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #7c3aed;
        }

        .status {
            margin-top: 12px;
            font-size: 0.9rem;
            color: #10b981;
            display: none;
        }
    </style>
</head>

<body>
    <h1>✨ Spellex Configuration</h1>

    <div class="form-group">
        <label for="apiKey">OpenRouter API Key</label>
        <input type="password" id="apiKey" placeholder="sk-or-v1-..." />
        <p style="font-size: 0.8rem; color: #94a3b8; margin-top: 4px;">Your key is stored securely in your browser and
            never sent to our servers.</p>
    </div>

    <div class="form-group">
        <label for="targetLanguage">Target Language</label>
        <select id="targetLanguage"
            style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #475569; background-color: #1e293b; color: white;">
            <option value="auto">Auto-Detect (Let AI decide)</option>
            <option value="spanish">Spanish (Español)</option>
            <option value="english">English</option>
            <option value="french">French (Français)</option>
            <option value="german">German (Deutsch)</option>
            <option value="italian">Italian (Italiano)</option>
            <option value="portuguese">Portuguese (Português)</option>
        </select>
        <p style="font-size: 0.8rem; color: #94a3b8; margin-top: 4px;">Force Spellex to correct towards this language to
            prevent mixing up similar languages.</p>
    </div>

    <button id="saveBtn">Save Settings</button>
    <div id="status" class="status">Settings saved successfully!</div>

    <script type="module" src="/src/options.ts"></script>
</body>

</html>
